name: Daily AI Brief

on:
  schedule:
    - cron: '20 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-brief:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run AI brief
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 ai_brief.py
      - name: Check if files were updated
        run: ls -l seen_articles.json || echo "File not found yet"
      - name: Commit updated archive files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json
          git add -A
          git diff --cached --quiet || git commit -m "Update AI brief archive"
          git push
